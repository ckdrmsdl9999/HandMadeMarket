# main 브랜치에 반영된 백엔드 코드만 EC2 운영 서버로 배포하도록 설정함
name: Backend CD

# 백엔드 관련 파일이 main에 반영될 때만 Spring Boot blue-green 배포를 실행함
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'deploy/backend-deploy.sh'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      # Docker 이미지 빌드 구성이 바뀌면 백엔드 이미지를 새로 만들도록 포함함
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/backend-deploy.yml'

# GHCR에 백엔드 이미지를 push하기 위해 패키지 쓰기 권한을 추가함
permissions:
  contents: read
  packages: write

# 프론트와 백엔드가 같은 EC2 작업 디렉터리를 쓰므로 배포 작업이 동시에 돌지 않게 막음
concurrency:
  group: cd-ec2-main
  cancel-in-progress: false

jobs:
  build-image:
    # 백엔드 이미지는 GitHub-hosted runner에서 만들어 EC2 배포 부하를 줄임
    runs-on: ubuntu-latest

    outputs:
      # deploy job이 같은 이미지 태그를 pull하도록 빌드 결과 메타데이터를 전달함
      image: ${{ steps.image-meta.outputs.image }}
      tag: ${{ steps.image-meta.outputs.tag }}

    steps:
      # Dockerfile 기준으로 이미지를 만들 수 있게 저장소 코드를 가져옴
      - name: Checkout source
        uses: actions/checkout@v5

      # GHCR 이미지 이름은 대문자를 허용하지 않아 소문자로 정규화함
      - name: Set image metadata
        id: image-meta
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/handmade-market-backend" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # workflow 기본 토큰으로 GHCR에 이미지를 올릴 수 있게 로그인함
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      # 커밋 SHA와 latest 태그를 함께 push해 배포는 고정 태그, 수동 확인은 latest로 가능하게 함
      - name: Build and push Docker image
        run: |
          docker build \
            -t "${{ steps.image-meta.outputs.image }}:${{ steps.image-meta.outputs.tag }}" \
            -t "${{ steps.image-meta.outputs.image }}:latest" \
            .
          docker push "${{ steps.image-meta.outputs.image }}:${{ steps.image-meta.outputs.tag }}"
          docker push "${{ steps.image-meta.outputs.image }}:latest"

  deploy:
    # 이미지 빌드가 성공한 뒤 EC2 self-hosted runner에서 실제 배포만 수행함
    needs: build-image
    runs-on: [self-hosted, Linux, X64]

    steps:
      # EC2 운영 프로젝트를 최신 main으로 맞춘 뒤 GHCR 이미지를 받아 Blue-Green 배포함
      - name: Deploy
        env:
          BACKEND_IMAGE: ${{ needs.build-image.outputs.image }}:${{ needs.build-image.outputs.tag }}
        run: |
          set -e
          cd /home/ubuntu/HandMadeMarket
          git fetch origin main
          git switch main
          git pull --ff-only origin main
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          sudo docker pull "$BACKEND_IMAGE"
          chmod +x ./deploy/backend-deploy.sh
          ./deploy/backend-deploy.sh
