# GitHub Actions에서 Spring Boot 빌드 검사를 자동 실행하도록 추가함
name: CI

# main/dev과 기능,comm 브랜치 변경 시 빌드 상태를 확인하도록 추가함
on:
  push:
    branches:
      - main
      - dev
      - 'comm/*'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    # GitHub에서 제공하는 리눅스 실행 환경으로 Gradle 빌드를 검증하도록 추가함
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드를 내려받아 CI 빌드 대상이 되도록 추가함
      - name: Checkout source
        uses: actions/checkout@v4

      # 프로젝트의 Java 17 설정과 맞춰 빌드 환경을 고정하도록 추가함
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          # Gradle 의존성 캐시를 재사용해 반복 CI 시간을 줄이도록 추가함
          cache: gradle

      # 리눅스 CI 환경에서 Gradle wrapper를 실행할 수 있도록 권한을 부여함
      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      # 컴파일, 테스트, 패키징이 모두 통과하는지 확인하도록 수정
      - name: Build with Gradle
        run: ./gradlew clean build
