# GitHub Actions에서 Spring Boot 빌드 검사를 자동 실행하도록 추가함
name: CI

# main/dev과 기능,comm 브랜치 변경 시 빌드 상태를 확인하도록 추가함
on:
  push:
    branches:
      - main
      - dev
      - 'comm/*'
      - 'feature/**'
      - 'cd/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend-build:
    # GitHub에서 제공하는 리눅스 실행 환경으로 Gradle 빌드를 검증하도록 추가함
    runs-on: ubuntu-latest

    steps:
      # Node 24 기반 공식 액션으로 올려 CI의 구버전 런타임 경고를 제거함
      - name: Checkout source
        uses: actions/checkout@v5

      # Node 24 기반 공식 액션으로 Java 17 빌드 환경을 경고 없이 고정함
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          # Gradle 의존성 캐시를 재사용해 반복 CI 시간을 줄이도록 추가함
          cache: gradle

      # 리눅스 CI 환경에서 Gradle wrapper를 실행할 수 있도록 권한을 부여함
      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      # 컴파일, 테스트, 패키징이 모두 통과하는지 확인하도록 수정
      - name: Build with Gradle
        run: ./gradlew clean build

  frontend-build:
    # React 프론트도 PR 단계에서 lint와 build가 통과하는지 확인하도록 추가함
    runs-on: ubuntu-latest

    steps:
      # Node 24 기반 공식 액션으로 올려 CI의 구버전 런타임 경고를 제거함
      - name: Checkout source
        uses: actions/checkout@v5

      # Vite 8 지원 범위에 맞춰 프론트 빌드 Node를 24로 고정함
      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # package-lock 기준으로 프론트 의존성을 재현 가능하게 설치함
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # React 코드 스타일과 hook 규칙을 먼저 검사함
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      # nginx 정적 배포에 필요한 Vite production bundle 생성 가능 여부를 확인함
      - name: Build frontend
        working-directory: frontend
        run: npm run build
