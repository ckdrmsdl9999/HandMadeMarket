server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        # React와 API를 같은 hmadeshop.com 도메인에서 쓰므로 기본적인 외부 이동 후 세션 유지에 맞춤
        same-site: lax
        # 운영 nginx가 HTTPS를 처리하므로 세션 쿠키를 보안 쿠키로 유지함
        secure: true

spring:
  session:
    # 운영 Blue-Green 배포에서 8080/8081이 같은 로그인 세션을 보도록 Redis 저장소를 사용함
    store-type: redis
    redis:
      # Redis 안에서 이 서비스 세션 key를 구분해 다른 데이터와 섞이지 않게 함
      namespace: handmade:session
      # 요청이 끝날 때 변경된 세션만 저장해 Redis 쓰기 부담을 줄임
      flush-mode: on-save
      # 변경된 세션 속성만 저장해 OAuth2/일반 로그인 세션 갱신 범위를 줄임
      save-mode: on-set-attribute

  data:
    redis:
      # EC2 Redis 주소를 환경변수로 바꿀 수 있게 하되 기본은 같은 서버 localhost로 둠
      host: ${REDIS_HOST:127.0.0.1}
      # Redis 기본 포트를 사용하고 운영에서 필요하면 환경변수로 변경함
      port: ${REDIS_PORT:6379}
      # Redis DB 번호를 환경변수로 분리해 세션 저장 공간을 나눌 수 있게 함
      database: ${REDIS_DATABASE:0}
      # Redis 암호가 없는 로컬/EC2 구성을 기본값으로 두고 필요 시 환경변수로 주입함
      password: ${REDIS_PASSWORD:}
      # Redis 장애 시 요청이 오래 묶이지 않도록 연결 대기 시간을 제한함
      timeout: ${REDIS_TIMEOUT:3s}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            # 백엔드 배포 주소가 바뀌어도 OAuth callback 주소를 환경변수로 맞출 수 있게 함
            redirect-uri: ${BACKEND_BASE_URL:https://hmadeshop.com}/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            # OAuth2 사용자 저장 흐름에서 사용하는 이름과 이메일 동의 항목만 요청하도록 맞춤
            scope:
              - name
              - email
            client-name: Naver

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # 구글 OAuth callback도 백엔드 운영 주소 기준으로 계산하게 맞춤
            redirect-uri: ${BACKEND_BASE_URL:https://hmadeshop.com}/login/oauth2/code/google
            scope:
              - openid
              - profile
              - email

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

app:
  # OAuth 성공/실패 후 같은 EC2 nginx 도메인의 React 화면으로 이동하게 환경변수로 분리함
  frontend-url: ${FRONTEND_URL:https://hmadeshop.com}
  storage:
    # S3 원본 대신 CloudFront 배포 주소를 응답 URL 기준으로 사용함
    cloud-front-base-url: ${CLOUDFRONT_BASE_URL:}
    s3:
      # 운영 버킷 리전을 환경변수로 분리해 S3 클라이언트 설정과 맞춤
      region: ${AWS_REGION:ap-northeast-2}
      # 상품/배너 이미지를 저장할 S3 버킷 이름을 운영 환경변수로 주입함
      bucket: ${AWS_S3_BUCKET:}
      # 상품 이미지 object key를 한 경로 아래에 모아 관리함
      product-prefix: ${AWS_S3_PRODUCT_PREFIX:products}
      # 홈 배너 이미지 object key를 한 경로 아래에 모아 관리함
      banner-prefix: ${AWS_S3_BANNER_PREFIX:home}
      # 이미지 업로드 최대 크기를 운영에서 조정할 수 있게 함
      max-upload-size-mb: ${IMAGE_MAX_UPLOAD_SIZE_MB:5}
  cors:
    # 로컬 Vite 개발 서버와 운영 단일 도메인 React에서 API 호출을 허용함
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://hmadeshop.com}
