<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 둘러보기 | HandMade Market</title>
    <style>
        /* 홈과 같은 브랜드 색상으로 검색 결과 페이지 톤을 맞춤 */
        :root {
            --bg: #f4f7fd;
            --surface: #ffffff;
            --ink: #0f1729;
            --muted: #5e6778;
            --line: #dde4f0;
            --brand-blue: #3566ff;
            --brand-blue-dark: #224fd6;
            --accent: #ff6f2c;
            --accent-dark: #df5616;
            --soft: #edf2ff;
            --green: #1f7a4d;
            --shadow: 0 14px 34px rgba(28, 58, 125, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        /* 홈과 같은 배경과 폰트로 이동 후 화면 이질감을 줄임 */
        body {
            margin: 0;
            color: var(--ink);
            background:
                    radial-gradient(circle at 8% 2%, rgba(53, 102, 255, 0.18), transparent 24%),
                    radial-gradient(circle at 94% 0%, rgba(255, 111, 44, 0.14), transparent 22%),
                    var(--bg);
            font-family: "SUIT", "Pretendard", "Noto Sans KR", sans-serif;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        /* 홈 헤더와 같은 폭 기준을 사용해 검색창 위치를 맞춤 */
        .container {
            width: min(1240px, 100% - 28px);
            margin: 0 auto;
        }

        /* 홈 상단 유틸리티 바를 검색 결과 페이지에도 적용함 */
        .utility-bar {
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .utility-inner {
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--muted);
        }

        .utility-links,
        .header-actions,
        .gnb-inner {
            display: flex;
            align-items: center;
        }

        .utility-links {
            gap: 14px;
        }

        .utility-links a,
        .utility-links button {
            color: var(--muted);
            text-decoration: none;
            background: none;
            border: 0;
            padding: 0;
            font-size: 13px;
            cursor: pointer;
        }

        /* 홈 검색 헤더와 같은 형태로 상품 검색 진입부를 맞춤 */
        .main-header {
            background: #fff;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .main-header-inner {
            min-height: 86px;
            display: grid;
            grid-template-columns: auto auto 1fr auto;
            align-items: center;
            gap: 14px;
        }

        .logo {
            text-decoration: none;
            color: var(--ink);
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.7px;
        }

        .logo em {
            color: var(--brand-blue);
            font-style: normal;
        }

        .category-btn {
            border: 0;
            background: linear-gradient(145deg, #2e5af6 0%, #2349c8 100%);
            color: #fff;
            padding: 13px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-form {
            display: grid;
            grid-template-columns: auto 1fr auto;
            border: 2px solid var(--brand-blue);
            border-radius: 13px;
            overflow: hidden;
            background: #fff;
        }

        .search-form select,
        .search-form input {
            border: 0;
            background: #fff;
            font-size: 14px;
            min-height: 46px;
            color: var(--ink);
        }

        .search-form select {
            min-width: 140px;
            padding: 0 10px;
            border-right: 1px solid var(--line);
        }

        .search-form input {
            padding: 0 14px;
        }

        .search-form input:focus {
            outline: 0;
        }

        .search-btn {
            border: 0;
            background: linear-gradient(145deg, var(--accent) 0%, #ff8a4f 100%);
            color: #fff;
            width: 56px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
        }

        .header-actions {
            gap: 14px;
            margin-left: 6px;
        }

        .header-link {
            text-decoration: none;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .header-link strong {
            display: block;
            color: var(--ink);
            font-size: 15px;
            margin-top: 3px;
        }

        /* 홈 GNB를 유지해 검색 결과 화면에서도 같은 탐색 흐름을 제공함 */
        .gnb {
            background: #fff;
            border-bottom: 1px solid var(--line);
        }

        .gnb-inner {
            min-height: 50px;
            gap: 18px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
        }

        .gnb-inner a {
            text-decoration: none;
            color: var(--ink);
            font-size: 14px;
            font-weight: 600;
        }

        .gnb-inner a.highlight {
            color: var(--accent-dark);
        }

        /* 검색 결과 중심 화면으로 보이도록 상단 안내 영역을 낮춤 */
        main {
            padding: 20px 0 56px;
        }

        .result-hero,
        .panel,
        .product-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .result-hero {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            padding: 22px;
            margin: 20px 0 16px;
        }

        .result-hero h1 {
            margin: 0 0 8px;
            font-size: 30px;
            letter-spacing: -0.3px;
        }

        .result-hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .btn {
            border: 0;
            border-radius: 11px;
            padding: 12px 18px;
            background: var(--brand-blue);
            color: #fff;
            cursor: pointer;
            font-weight: 800;
        }

        .btn-light {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-green {
            background: var(--green);
        }

        .panel {
            padding: 26px;
            margin: 0 0 42px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 18px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: -.04em;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
        }

        .status.error {
            color: #a53a26;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .product-card {
            overflow: hidden;
            display: grid;
            min-height: 360px;
        }

        /* 홈 상품 카드와 비슷한 밝은 톤으로 결과 카드 이미지를 맞춤 */
        .product-visual {
            min-height: 150px;
            padding: 18px;
            background:
                    radial-gradient(circle at 70% 30%, rgba(255, 255, 255, .42), transparent 25%),
                    linear-gradient(135deg, #5888ff, #2d57db);
            color: rgba(255, 255, 255, .92);
            display: flex;
            align-items: end;
            font-size: 13px;
            line-height: 1.5;
        }

        .product-body {
            display: grid;
            gap: 12px;
            padding: 18px;
        }

        .product-title {
            margin: 0;
            font-size: 19px;
            line-height: 1.35;
        }

        .meta {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .price {
            font-size: 22px;
            font-weight: 900;
        }

        .cart-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cart-row input {
            width: 72px;
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 10px 12px;
            background: #fff;
        }

        .empty {
            padding: 34px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 22px;
        }

        /* 홈 반응형 헤더 규칙과 맞춰 작은 화면에서도 검색창이 먼저 보이게 함 */
        @media (max-width: 1180px) {
            .main-header-inner {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 12px 0;
            }

            .header-actions {
                margin: 0;
                justify-content: flex-start;
            }
        }

        @media (max-width: 900px) {
            .result-hero {
                align-items: flex-start;
                flex-direction: column;
            }

            .products {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) {
            .utility-inner,
            .section-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .utility-inner {
                height: auto;
                gap: 8px;
                padding: 10px 0;
            }

            .search-form {
                grid-template-columns: 1fr auto;
            }

            .search-form select {
                display: none;
            }

            .products {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<!-- 홈과 같은 상단 유틸리티를 써 검색 결과 페이지의 진입감을 맞춤 -->
<header class="utility-bar">
    <div class="container utility-inner">
        <span>오늘 도착처럼 빠르게, 장인 제품도 간편하게.</span>
        <nav class="utility-links">
            <a th:if="${!isLoggedIn}" th:href="@{/login}">로그인</a>
            <span th:if="${isLoggedIn}" th:text="'안녕하세요, ' + ${displayName} + '님'">안녕하세요, 사용자님</span>
            <a th:href="@{/loginSuccess}">내 정보</a>
            <form th:if="${isLoggedIn}" th:action="@{/logout/naver}" method="post">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
    </div>
</header>

<!-- 홈 검색창과 같은 구조로 /shop 내부 검색을 처리함 -->
<header class="main-header">
    <div class="container main-header-inner">
        <a class="logo" th:href="@{/}">HandMade <em>Market</em></a>
        <button class="category-btn" type="button">전체 카테고리</button>
        <form id="shop-search-form" class="search-form" action="/shop" method="get" th:action="@{/shop}">
            <label for="category" style="display: none;">카테고리</label>
            <select id="category" name="category">
                <option value="">전체</option>
                <option value="비누">비누</option>
                <option value="목공">목공</option>
                <option value="패브릭">패브릭</option>
                <option value="문구">문구</option>
            </select>
            <label for="keyword" style="display: none;">검색어</label>
            <input id="keyword" name="keyword" type="text" placeholder="찾고 싶은 핸드메이드 제품을 검색해보세요">
            <button class="search-btn" id="search-btn" type="submit">Q</button>
        </form>
        <div class="header-actions">
            <a class="header-link" th:if="${!isLoggedIn}" th:href="@{/login}">
                계정
                <strong>로그인</strong>
            </a>
            <a class="header-link" th:if="${isLoggedIn}" th:href="@{/loginSuccess}">
                계정
                <strong>내 정보</strong>
            </a>
            <a class="header-link" th:href="@{/cart}">
                장바구니
                <strong>보기</strong>
            </a>
            <a class="header-link" th:if="${isLoggedIn}" th:href="@{/orders}">
                주문
                <strong>내역</strong>
            </a>
        </div>
    </div>
</header>

<!-- 홈 GNB와 같은 탐색 흐름을 검색 결과 페이지에도 유지함 -->
<nav class="gnb">
    <div class="container gnb-inner">
        <a class="highlight" th:href="@{/shop}">상품 둘러보기</a>
        <a th:href="@{/shop}">신상품</a>
        <a th:href="@{/shop}">베스트</a>
        <a th:href="@{/shop(category='비누')}">비누</a>
        <a th:href="@{/shop(category='목공')}">목공</a>
        <a th:href="@{/shop(category='패브릭')}">패브릭</a>
        <a th:href="@{/shop(category='문구')}">문구</a>
    </div>
</nav>

<main class="container">
    <!-- 검색 결과 페이지 성격에 맞춰 안내 영역을 상품 목록 위로 줄임 -->
    <section class="result-hero">
        <div>
            <h1>상품 검색 결과</h1>
            <p>검색 조건에 맞는 핸드메이드 상품을 모았습니다.</p>
        </div>
        <button class="btn btn-light" id="reset-btn" type="button">전체 보기</button>
    </section>

    <section class="panel">
        <div class="section-head">
            <div>
                <h2>상품 목록</h2>
                <div id="status" class="status">상품을 불러오는 중입니다.</div>
            </div>
            <a class="btn btn-green" th:if="${isLoggedIn}" th:href="@{/cart}">장바구니 보기</a>
        </div>
        <div id="products" class="products"></div>
        <div id="empty" class="empty" style="display: none;">표시할 상품이 없습니다.</div>
    </section>
</main>

<script th:inline="javascript">
    const pageState = {
        isLoggedIn: [[${isLoggedIn}]],
        userId: [[${currentUserId}]]
    };

    const refs = {
        products: document.getElementById('products'),
        empty: document.getElementById('empty'),
        status: document.getElementById('status'),
        // 상단 검색바 submit을 잡아 /shop 결과 영역만 갱신하게 함
        searchForm: document.getElementById('shop-search-form'),
        keyword: document.getElementById('keyword'),
        category: document.getElementById('category'),
        resetButton: document.getElementById('reset-btn')
    };

    // /shop 검색 폼 제출을 페이지 이동 없이 같은 결과 영역 갱신으로 처리함
    refs.searchForm.addEventListener('submit', searchProducts);
    refs.resetButton.addEventListener('click', () => {
        refs.keyword.value = '';
        refs.category.value = '';
        history.replaceState(null, '', '/shop');
        loadProducts('/api/products');
    });
    refs.products.addEventListener('click', handleProductAction);

    // 검색 URL로 들어온 조건을 입력값에 반영해 홈 검색 결과를 바로 보여줌
    initializeSearchFromLocation();

    // 브라우저 뒤로가기로 검색 조건이 바뀌어도 결과와 입력값을 맞춤
    window.addEventListener('popstate', initializeSearchFromLocation);

    async function searchProducts(event) {
        event.preventDefault();
        const keyword = refs.keyword.value.trim();
        const category = refs.category.value;
        const params = new URLSearchParams();

        if (category) {
            params.set('category', category);
        }
        if (keyword) {
            params.set('keyword', keyword);
        }

        const queryString = params.toString();
        history.pushState(null, '', queryString ? `/shop?${queryString}` : '/shop');

        await loadProducts(resolveProductsUrl());
    }

    // URL 조건을 검색 API 경로로 바꿔 상품 목록 조회 기준을 한 곳에서 관리함
    function resolveProductsUrl() {
        const keyword = refs.keyword.value.trim();
        const category = refs.category.value;

        if (keyword) {
            return `/api/products/search?keyword=${encodeURIComponent(keyword)}`;
        }
        if (category) {
            return `/api/products/category/${encodeURIComponent(category)}`;
        }
        return '/api/products';
    }

    // 홈과 GNB에서 넘어온 query string을 /shop 검색 입력과 결과에 동기화함
    function initializeSearchFromLocation() {
        const params = new URLSearchParams(window.location.search);
        refs.keyword.value = params.get('keyword') || '';
        refs.category.value = params.get('category') || '';
        loadProducts(resolveProductsUrl());
    }

    async function loadProducts(url) {
        try {
            setStatus('상품을 불러오는 중입니다.', '');
            const products = await requestJson(url);
            renderProducts(products);
            setStatus(`${products.length}개의 상품을 표시합니다.`, '');
        } catch (error) {
            renderProducts([]);
            setStatus(error.message, 'error');
        }
    }

    function renderProducts(products) {
        refs.products.innerHTML = '';
        refs.empty.style.display = products.length ? 'none' : 'block';

        refs.products.innerHTML = products.map(product => `
            <article class="product-card">
                <a class="product-visual" href="/products/${product.productId}">
                    ${escapeHtml(product.mainImage || product.category || 'Handmade product')}
                </a>
                <div class="product-body">
                    <div>
                        <h3 class="product-title">${escapeHtml(product.productName)}</h3>
                        <div class="meta">
                            ${escapeHtml(product.category || '미분류')} · ${escapeHtml(product.sellerName || '판매자 미상')}<br>
                            재고 ${product.quantity ?? 0}개 · 판매 ${product.salesCount ?? 0}개
                        </div>
                    </div>
                    <div class="price">${formatMoney(product.price)}원</div>
                    <div class="cart-row">
                        <input type="number" min="1" value="1" aria-label="수량">
                        <button class="btn btn-green" type="button" data-product-id="${product.productId}" ${product.isSoldOut ? 'disabled' : ''}>
                            ${product.isSoldOut ? '품절' : '담기'}
                        </button>
                    </div>
                </div>
            </article>
        `).join('');
    }

    async function handleProductAction(event) {
        const button = event.target.closest('button[data-product-id]');
        if (!button) {
            return;
        }
        if (!pageState.isLoggedIn || !pageState.userId) {
            location.href = '/login';
            return;
        }

        const card = button.closest('.product-card');
        const quantity = Number(card.querySelector('input[type="number"]').value);
        if (!Number.isInteger(quantity) || quantity <= 0) {
            setStatus('수량은 1개 이상이어야 합니다.', 'error');
            return;
        }

        try {
            await requestJson(`/api/carts/${pageState.userId}/items`, {
                method: 'POST',
                body: JSON.stringify({
                    productId: Number(button.dataset.productId),
                    quantity
                })
            });
            setStatus('장바구니에 상품을 담았습니다.', '');
        } catch (error) {
            setStatus(error.message, 'error');
        }
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
            ...options
        });
        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `요청 실패: ${response.status}`);
        }
        return response.status === 204 ? null : response.json();
    }

    function setStatus(message, type) {
        refs.status.textContent = message;
        refs.status.className = `status ${type || ''}`;
    }

    function formatMoney(value) {
        return Number(value || 0).toLocaleString('ko-KR');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
