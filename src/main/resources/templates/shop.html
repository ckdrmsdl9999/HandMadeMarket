<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 둘러보기 | HandMade Market</title>
    <style>
        :root {
            --ink: #20201d;
            --muted: #777067;
            --paper: #fffaf1;
            --line: #eadcc8;
            --brand: #b85c38;
            --brand-dark: #7b341f;
            --green: #426b4f;
            --shadow: 0 18px 45px rgba(65, 42, 28, .12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            background:
                    radial-gradient(circle at 15% 10%, rgba(245, 180, 108, .25), transparent 30%),
                    linear-gradient(135deg, #fff7e8 0%, #f3eadc 52%, #e9f0df 100%);
            font-family: "Noto Serif KR", Georgia, serif;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .container {
            width: min(1160px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar {
            padding: 18px 0;
            border-bottom: 1px solid rgba(90, 56, 34, .12);
            background: rgba(255, 250, 241, .78);
            backdrop-filter: blur(12px);
        }

        .topbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -.04em;
        }

        .logo em {
            color: var(--brand);
            font-style: normal;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--muted);
            font-size: 14px;
        }

        .nav a,
        .nav button {
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            gap: 24px;
            align-items: stretch;
            padding: 42px 0 24px;
        }

        .hero-card,
        .panel,
        .product-card {
            background: rgba(255, 250, 241, .86);
            border: 1px solid rgba(122, 79, 47, .14);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .hero-card {
            padding: 38px;
            background:
                    linear-gradient(135deg, rgba(184, 92, 56, .95), rgba(123, 52, 31, .92)),
                    var(--brand);
            color: #fff8ec;
            min-height: 250px;
        }

        .hero-card h1 {
            margin: 0 0 16px;
            font-size: clamp(36px, 5vw, 66px);
            line-height: .95;
            letter-spacing: -.07em;
        }

        .hero-card p {
            max-width: 560px;
            margin: 0;
            color: rgba(255, 248, 236, .78);
            line-height: 1.7;
        }

        .filter-panel {
            padding: 28px;
        }

        .filter-panel h2 {
            margin: 0 0 18px;
            font-size: 22px;
        }

        .filters {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .field label {
            color: var(--muted);
            font-size: 13px;
        }

        .field input,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 13px 14px;
            background: #fffdf8;
            color: var(--ink);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            background: var(--ink);
            color: #fffaf1;
            cursor: pointer;
            font-weight: 800;
        }

        .btn-light {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-green {
            background: var(--green);
        }

        .panel {
            padding: 26px;
            margin: 18px 0 42px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 18px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: -.04em;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
        }

        .status.error {
            color: #a53a26;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .product-card {
            overflow: hidden;
            display: grid;
            min-height: 360px;
        }

        .product-visual {
            min-height: 150px;
            padding: 18px;
            background:
                    radial-gradient(circle at 70% 30%, rgba(255, 255, 255, .42), transparent 25%),
                    linear-gradient(135deg, #e9bd8c, #b85c38);
            color: rgba(255, 250, 241, .92);
            display: flex;
            align-items: end;
            font-size: 13px;
            line-height: 1.5;
        }

        .product-body {
            display: grid;
            gap: 12px;
            padding: 18px;
        }

        .product-title {
            margin: 0;
            font-size: 19px;
            line-height: 1.35;
        }

        .meta {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .price {
            font-size: 22px;
            font-weight: 900;
        }

        .cart-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cart-row input {
            width: 72px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 12px;
            background: #fffdf8;
        }

        .empty {
            padding: 34px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 22px;
        }

        @media (max-width: 900px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .products {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) {
            .topbar-inner,
            .section-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .products {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <a class="logo" th:href="@{/}">HandMade <em>Market</em></a>
        <nav class="nav">
            <a th:href="@{/}">홈</a>
            <a th:href="@{/shop}">상품</a>
            <a th:href="@{/cart}">장바구니</a>
            <a th:if="${isLoggedIn}" th:href="@{/orders}">주문내역</a>
            <a th:if="${isLoggedIn}" th:href="@{/seller/products/new}">판매자 상품</a>
            <a th:if="${currentUserRole == 'ADMIN'}" th:href="@{/admin/delivery}">배송관리</a>
            <a th:if="${currentUserRole == 'ADMIN'}" th:href="@{/admin/users}">사용자관리</a>
            <a th:if="${!isLoggedIn}" th:href="@{/login}">로그인</a>
            <form th:if="${isLoggedIn}" th:action="@{/logout/naver}" method="post">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <section class="hero">
        <article class="hero-card">
            <h1>작가의 물건을<br>바로 고르는 페이지</h1>
            <p>상품 전체 조회, 검색, 카테고리 필터, 장바구니 담기 흐름을 한 화면에서 확인합니다.</p>
        </article>
        <aside class="filter-panel panel">
            <h2>상품 찾기</h2>
            <div class="filters">
                <div class="field">
                    <label for="keyword">검색어</label>
                    <input id="keyword" type="text" placeholder="상품명을 입력하세요">
                </div>
                <div class="field">
                    <label for="category">카테고리</label>
                    <select id="category">
                        <option value="">전체</option>
                        <option value="craft">수공예</option>
                        <option value="food">핸드메이드 푸드</option>
                        <option value="living">리빙</option>
                        <option value="fabric">패브릭</option>
                        <option value="wood">목공</option>
                    </select>
                </div>
                <div class="actions">
                    <button class="btn" id="search-btn" type="button">검색</button>
                    <button class="btn btn-light" id="reset-btn" type="button">전체 보기</button>
                </div>
            </div>
        </aside>
    </section>

    <section class="panel">
        <div class="section-head">
            <div>
                <h2>상품 목록</h2>
                <div id="status" class="status">상품을 불러오는 중입니다.</div>
            </div>
            <a class="btn btn-green" th:if="${isLoggedIn}" th:href="@{/cart}">장바구니 보기</a>
        </div>
        <div id="products" class="products"></div>
        <div id="empty" class="empty" style="display: none;">표시할 상품이 없습니다.</div>
    </section>
</main>

<script th:inline="javascript">
    const pageState = {
        isLoggedIn: [[${isLoggedIn}]],
        userId: [[${currentUserId}]]
    };

    const refs = {
        products: document.getElementById('products'),
        empty: document.getElementById('empty'),
        status: document.getElementById('status'),
        keyword: document.getElementById('keyword'),
        category: document.getElementById('category'),
        searchButton: document.getElementById('search-btn'),
        resetButton: document.getElementById('reset-btn')
    };

    refs.searchButton.addEventListener('click', searchProducts);
    refs.resetButton.addEventListener('click', () => {
        refs.keyword.value = '';
        refs.category.value = '';
        loadProducts('/api/products');
    });
    refs.products.addEventListener('click', handleProductAction);

    // 화면 진입 시 전체 상품 목록을 먼저 보여줘 쇼핑 흐름을 바로 시작하게 함
    loadProducts('/api/products');

    async function searchProducts() {
        const keyword = refs.keyword.value.trim();
        const category = refs.category.value;

        if (keyword) {
            await loadProducts(`/api/products/search?keyword=${encodeURIComponent(keyword)}`);
            return;
        }
        if (category) {
            await loadProducts(`/api/products/category/${encodeURIComponent(category)}`);
            return;
        }
        await loadProducts('/api/products');
    }

    async function loadProducts(url) {
        try {
            setStatus('상품을 불러오는 중입니다.', '');
            const products = await requestJson(url);
            renderProducts(products);
            setStatus(`${products.length}개의 상품을 표시합니다.`, '');
        } catch (error) {
            renderProducts([]);
            setStatus(error.message, 'error');
        }
    }

    function renderProducts(products) {
        refs.products.innerHTML = '';
        refs.empty.style.display = products.length ? 'none' : 'block';

        refs.products.innerHTML = products.map(product => `
            <article class="product-card">
                <a class="product-visual" href="/products/${product.productId}">
                    ${escapeHtml(product.mainImage || product.category || 'Handmade product')}
                </a>
                <div class="product-body">
                    <div>
                        <h3 class="product-title">${escapeHtml(product.productName)}</h3>
                        <div class="meta">
                            ${escapeHtml(product.category || '미분류')} · ${escapeHtml(product.sellerName || '판매자 미상')}<br>
                            재고 ${product.quantity ?? 0}개 · 판매 ${product.salesCount ?? 0}개
                        </div>
                    </div>
                    <div class="price">${formatMoney(product.price)}원</div>
                    <div class="cart-row">
                        <input type="number" min="1" value="1" aria-label="수량">
                        <button class="btn btn-green" type="button" data-product-id="${product.productId}" ${product.isSoldOut ? 'disabled' : ''}>
                            ${product.isSoldOut ? '품절' : '담기'}
                        </button>
                    </div>
                </div>
            </article>
        `).join('');
    }

    async function handleProductAction(event) {
        const button = event.target.closest('button[data-product-id]');
        if (!button) {
            return;
        }
        if (!pageState.isLoggedIn || !pageState.userId) {
            location.href = '/login';
            return;
        }

        const card = button.closest('.product-card');
        const quantity = Number(card.querySelector('input[type="number"]').value);
        if (!Number.isInteger(quantity) || quantity <= 0) {
            setStatus('수량은 1개 이상이어야 합니다.', 'error');
            return;
        }

        try {
            await requestJson(`/api/carts/${pageState.userId}/items`, {
                method: 'POST',
                body: JSON.stringify({
                    productId: Number(button.dataset.productId),
                    quantity
                })
            });
            setStatus('장바구니에 상품을 담았습니다.', '');
        } catch (error) {
            setStatus(error.message, 'error');
        }
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
            ...options
        });
        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `요청 실패: ${response.status}`);
        }
        return response.status === 204 ? null : response.json();
    }

    function setStatus(message, type) {
        refs.status.textContent = message;
        refs.status.className = `status ${type || ''}`;
    }

    function formatMoney(value) {
        return Number(value || 0).toLocaleString('ko-KR');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
