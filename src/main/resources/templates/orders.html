<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문서와 주문내역 | HandMade Market</title>
    <style>
        /* 홈/상품 페이지와 같은 브랜드 토큰으로 주문 화면 색감을 통일함 */
        :root {
            --bg: #f4f7fd;
            --surface: #ffffff;
            --ink: #0f1729;
            --muted: #5e6778;
            --line: #dde4f0;
            --brand-blue: #3566ff;
            --brand-blue-dark: #224fd6;
            --accent: #ff6f2c;
            --accent-dark: #df5616;
            --soft: #edf2ff;
            --green: #1f7a4d;
            --danger: #d63d32;
            --shadow: 0 14px 34px rgba(28, 58, 125, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        /* 주문 화면도 홈/상품 페이지와 같은 배경과 폰트로 맞춤 */
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background:
                    radial-gradient(circle at 8% 2%, rgba(53, 102, 255, 0.18), transparent 24%),
                    radial-gradient(circle at 94% 0%, rgba(255, 111, 44, 0.14), transparent 22%),
                    var(--bg);
            font-family: "SUIT", "Pretendard", "Noto Sans KR", sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        /* 홈/상품 페이지와 같은 컨테이너 폭을 사용해 헤더와 본문 정렬을 맞춤 */
        .container {
            width: min(1240px, 100% - 28px);
            margin: 0 auto;
        }

        /* 상품 페이지와 같은 상단 유틸리티 바를 주문 화면에도 적용함 */
        .utility-bar {
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .utility-inner {
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--muted);
        }

        .utility-links,
        .header-actions,
        .gnb-inner {
            display: flex;
            align-items: center;
        }

        .utility-links {
            gap: 14px;
        }

        .utility-links a,
        .utility-links button {
            color: var(--muted);
            text-decoration: none;
            background: none;
            border: 0;
            padding: 0;
            font-size: 13px;
            cursor: pointer;
        }

        /* 홈/상품 페이지와 같은 메인 헤더 형태로 주문 화면 진입부를 맞춤 */
        .main-header {
            background: #fff;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .main-header-inner {
            min-height: 86px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .logo {
            text-decoration: none;
            color: var(--ink);
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.7px;
        }

        .logo em {
            color: var(--brand-blue);
            font-style: normal;
        }

        .header-actions {
            gap: 14px;
            margin-left: 6px;
        }

        .header-link {
            text-decoration: none;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .header-link strong {
            display: block;
            color: var(--ink);
            font-size: 15px;
            margin-top: 3px;
        }

        /* 상품 페이지와 같은 GNB를 유지해 주요 화면 이동을 통일함 */
        .gnb {
            background: #fff;
            border-bottom: 1px solid var(--line);
        }

        .gnb-inner {
            min-height: 50px;
            gap: 18px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
        }

        .gnb-inner a {
            text-decoration: none;
            color: var(--ink);
            font-size: 14px;
            font-weight: 600;
        }

        .gnb-inner a.highlight {
            color: var(--accent-dark);
        }

        /* 주문 화면 제목 영역을 상품 결과 페이지 안내 카드와 같은 톤으로 낮춤 */
        main {
            padding: 20px 0 56px;
        }

        .hero {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin: 20px 0 16px;
            padding: 22px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: 30px;
            letter-spacing: -0.3px;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .layout {
            display: grid;
            grid-template-columns: .92fr 1.08fr;
            gap: 22px;
            align-items: start;
            padding-bottom: 50px;
        }

        /* 주문 패널과 주문 카드도 상품 페이지 카드와 같은 흰 표면으로 맞춤 */
        .panel,
        .order-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .panel {
            padding: 26px;
        }

        .panel h2,
        .order-card h3 {
            margin: 0 0 16px;
            letter-spacing: -0.3px;
        }

        .cart-list {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: #fff;
        }

        .muted {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-top: 1px solid var(--line);
            font-size: 22px;
            font-weight: 900;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .field label {
            color: var(--muted);
            font-size: 13px;
        }

        .field input,
        .field textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 13px 14px;
            background: #fff;
            color: var(--ink);
        }

        .field textarea {
            min-height: 86px;
            resize: vertical;
        }

        .btn {
            border: 0;
            border-radius: 11px;
            padding: 12px 18px;
            color: #fff;
            background: var(--brand-blue);
            cursor: pointer;
            font-weight: 800;
        }

        .btn-light {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-danger {
            background: var(--danger);
        }

        .status {
            min-height: 22px;
            margin: 12px 0;
            color: var(--muted);
            font-size: 14px;
        }

        .status.error {
            color: var(--danger);
        }

        .orders {
            display: grid;
            gap: 16px;
        }

        .order-card {
            padding: 20px;
        }

        .order-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: start;
            margin-bottom: 14px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 7px 11px;
            background: var(--soft);
            color: var(--brand-blue-dark);
            font-size: 12px;
            font-weight: 900;
        }

        .items {
            display: grid;
            gap: 8px;
            margin: 14px 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 14px;
        }

        .edit-form {
            display: grid;
            gap: 10px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
        }

        .row-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .empty {
            padding: 32px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 20px;
        }

        /* 작은 화면에서 상단 헤더와 주문 컬럼이 자연스럽게 세로 배치되게 함 */
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .main-header-inner,
            .order-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .header-actions {
                margin: 0;
                justify-content: flex-start;
            }
        }

        @media (max-width: 560px) {
            .utility-inner {
                height: auto;
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
<!-- 홈/상품 페이지와 같은 유틸리티 헤더로 로그인 상태 표시를 통일함 -->
<header class="utility-bar">
    <div class="container utility-inner">
        <span>오늘 도착처럼 빠르게, 장인 제품도 간편하게.</span>
        <nav class="utility-links">
            <span th:text="'안녕하세요, ' + ${displayName} + '님'">안녕하세요, 사용자님</span>
            <a th:href="@{/loginSuccess}">내 정보</a>
            <form th:action="@{/logout/naver}" method="post">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
    </div>
</header>

<!-- 주문 화면 상단도 같은 브랜드 헤더로 맞춰 페이지 전환 이질감을 줄임 -->
<header class="main-header">
    <div class="container main-header-inner">
        <a class="logo" th:href="@{/}">HandMade <em>Market</em></a>
        <div class="header-actions">
            <a class="header-link" th:href="@{/shop}">
                <strong>상품 둘러보기</strong>
            </a>
            <a class="header-link" th:href="@{/cart}">

                <strong>장바구니 보기</strong>
            </a>
            <a class="header-link" th:href="@{/orders}">

                <strong>주문 내역</strong>
            </a>
            <a class="header-link" th:href="@{/loginSuccess}">

                <strong>내 정보</strong>
            </a>
        </div>
    </div>
</header>

<!-- 상품 페이지와 같은 GNB를 추가해 주요 화면 이동 위치를 맞춤 -->
<nav class="gnb">
    <div class="container gnb-inner">
        <a th:href="@{/shop}">상품 둘러보기</a>
        <a th:href="@{/cart}">장바구니</a>
        <a class="highlight" th:href="@{/orders}">주문내역</a>
        <a th:href="@{/shop(category='비누')}">비누</a>
        <a th:href="@{/shop(category='목공')}">목공</a>
        <a th:href="@{/shop(category='패브릭')}">패브릭</a>
        <a th:href="@{/shop(category='문구')}">문구</a>
    </div>
</nav>

<main class="container">
    <section class="hero">
        <h1>주문서 작성과<br>내 주문 관리</h1>
        <p>현재 장바구니 기준으로 주문을 만들고, 생성된 주문의 수령 정보 수정과 취소까지 처리합니다.</p>
    </section>

    <section class="layout">
        <aside class="panel">
            <h2>주문서</h2>
            <div id="cart-list" class="cart-list"></div>
            <div id="cart-empty" class="empty" style="display:none;">장바구니가 비어 있습니다.</div>
            <div class="total">
                <span>총 결제 금액</span>
                <strong id="cart-total">0원</strong>
            </div>
            <form id="order-form" class="form-grid">
                <div class="field">
                    <label for="recipientName">수령인</label>
                    <input id="recipientName" name="recipientName" required th:value="${displayName}">
                </div>
                <div class="field">
                    <label for="recipientPhone">연락처</label>
                    <input id="recipientPhone" name="recipientPhone" required placeholder="010-0000-0000">
                </div>
                <div class="field">
                    <label for="shippingAddress">배송지</label>
                    <textarea id="shippingAddress" name="shippingAddress" required placeholder="배송 받을 주소를 입력하세요"></textarea>
                </div>
                <button class="btn" type="submit">장바구니 상품으로 주문하기</button>
            </form>
            <div id="order-status" class="status"></div>
        </aside>

        <section class="panel">
            <h2>내 주문</h2>
            <div id="orders-status" class="status"></div>
            <div id="orders" class="orders"></div>
            <div id="orders-empty" class="empty" style="display:none;">아직 주문이 없습니다.</div>
        </section>
    </section>
</main>

<script th:inline="javascript">
    const pageState = {
        userId: [[${currentUserId}]]
    };

    const refs = {
        cartList: document.getElementById('cart-list'),
        cartEmpty: document.getElementById('cart-empty'),
        cartTotal: document.getElementById('cart-total'),
        orderForm: document.getElementById('order-form'),
        orderStatus: document.getElementById('order-status'),
        ordersStatus: document.getElementById('orders-status'),
        orders: document.getElementById('orders'),
        ordersEmpty: document.getElementById('orders-empty')
    };

    // 서버 enum 값은 유지하고 주문 상태 배지만 한글로 표시함
    const orderStatusLabels = {
        PENDING: '배송 대기 중',
        PAID: '결제 완료',
        SHIPPING: '배송 중',
        COMPLETED: '배송 완료',
        CANCELED: '주문 취소'
    };

    refs.orderForm.addEventListener('submit', createOrder);
    refs.orders.addEventListener('click', handleOrderAction);

    // 주문 화면 진입 시 장바구니와 주문 목록을 같이 불러와 주문 전후 흐름을 한 화면에 둠
    initializeOrdersPage();

    async function initializeOrdersPage() {
        await Promise.all([loadCart(), loadOrders()]);
    }

    async function loadCart() {
        try {
            const cart = await requestJson(`/api/carts/${pageState.userId}`);
            renderCart(cart);
        } catch (error) {
            renderCart({ cartItems: [], totalAmount: 0 });
            setStatus(refs.orderStatus, error.message, 'error');
        }
    }

    function renderCart(cart) {
        const items = cart.cartItems || [];
        refs.cartList.innerHTML = items.map(item => `
            <div class="cart-item">
                <div>
                    <strong>${escapeHtml(item.productNameSnapshot)}</strong>
                    <div class="muted">${formatMoney(item.unitPriceSnapshot)}원 × ${item.quantity}개</div>
                </div>
                <strong>${formatMoney(item.lineAmount)}원</strong>
            </div>
        `).join('');
        refs.cartEmpty.style.display = items.length ? 'none' : 'block';
        refs.cartTotal.textContent = `${formatMoney(cart.totalAmount)}원`;
        refs.orderForm.querySelector('button[type="submit"]').disabled = items.length === 0;
    }

    async function loadOrders() {
        try {
            setStatus(refs.ordersStatus, '주문 목록을 불러오는 중입니다.', '');
            const orders = await requestJson('/api/orders/me');
            renderOrders(orders);
            setStatus(refs.ordersStatus, `${orders.length}개의 주문이 있습니다.`, '');
        } catch (error) {
            renderOrders([]);
            setStatus(refs.ordersStatus, error.message, 'error');
        }
    }

    function renderOrders(orders) {
        refs.ordersEmpty.style.display = orders.length ? 'none' : 'block';
        refs.orders.innerHTML = orders.map(order => {
            // 주문 상태 비교용 원본값과 화면 표시용 한글 라벨을 분리함
            const orderStatusLabel = formatOrderStatus(order.orderStatus);

            return `
            <article class="order-card" data-order-id="${order.orderId}">
                <div class="order-head">
                    <div>
                        <h3>주문 ${escapeHtml(order.orderNumber)}</h3>
                        <div class="muted">${formatDate(order.orderDate)} · ${formatMoney(order.totalAmount)}원</div>
                    </div>
                    <span class="badge">${escapeHtml(orderStatusLabel)}</span>
                </div>
                <div class="items">
                    ${(order.items || []).map(item => `
                        <div class="item-row">
                            <span>${escapeHtml(item.productName)} · ${item.quantity}개</span>
                            <strong>${formatMoney(item.lineAmount)}원</strong>
                        </div>
                    `).join('')}
                </div>
                <form class="edit-form">
                    <div class="field">
                        <label>수령인</label>
                        <input name="recipientName" value="${escapeHtml(order.recipientName)}">
                    </div>
                    <div class="field">
                        <label>연락처</label>
                        <input name="recipientPhone" value="${escapeHtml(order.recipientPhone)}">
                    </div>
                    <div class="field">
                        <label>배송지</label>
                        <textarea name="shippingAddress">${escapeHtml(order.shippingAddress)}</textarea>
                    </div>
                </form>
                <div class="row-actions">
                    <button class="btn btn-light" type="button" data-action="update" ${order.orderStatus !== 'PENDING' ? 'disabled' : ''}>수령 정보 수정</button>
                    <button class="btn btn-danger" type="button" data-action="cancel" ${order.orderStatus !== 'PENDING' ? 'disabled' : ''}>주문 취소</button>
                </div>
            </article>
        `;
        }).join('');
    }

    async function createOrder(event) {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(refs.orderForm).entries());
        try {
            const result = await requestJson('/api/orders', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            setStatus(refs.orderStatus, `주문이 생성되었습니다. 주문 ID: ${result.orderId}`, '');
            refs.orderForm.reset();
            await initializeOrdersPage();
        } catch (error) {
            setStatus(refs.orderStatus, error.message, 'error');
        }
    }

    async function handleOrderAction(event) {
        const button = event.target.closest('button[data-action]');
        if (!button) {
            return;
        }

        const card = button.closest('.order-card');
        const orderId = Number(card.dataset.orderId);
        try {
            if (button.dataset.action === 'update') {
                const payload = Object.fromEntries(new FormData(card.querySelector('.edit-form')).entries());
                await requestJson(`/api/orders/${orderId}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                setStatus(refs.ordersStatus, '수령 정보가 수정되었습니다.', '');
            }
            if (button.dataset.action === 'cancel') {
                await requestJson(`/api/orders/${orderId}/cancel`, { method: 'PATCH' });
                setStatus(refs.ordersStatus, '주문이 취소되었습니다.', '');
            }
            await Promise.all([loadCart(), loadOrders()]);
        } catch (error) {
            setStatus(refs.ordersStatus, error.message, 'error');
        }
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
            ...options
        });
        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `요청 실패: ${response.status}`);
        }
        return response.status === 204 ? null : response.json();
    }

    function setStatus(target, message, type) {
        target.textContent = message;
        target.className = `status ${type || ''}`;
    }

    function formatMoney(value) {
        return Number(value || 0).toLocaleString('ko-KR');
    }

    function formatDate(value) {
        if (!value) {
            return '-';
        }
        const date = Array.isArray(value)
            ? new Date(value[0], value[1] - 1, value[2], value[3] || 0, value[4] || 0)
            : new Date(value);
        return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString('ko-KR');
    }

    // 새 주문 상태가 추가돼도 원본 상태값을 보여줄 수 있게 기본값을 둠
    function formatOrderStatus(status) {
        return orderStatusLabels[status] || status;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
