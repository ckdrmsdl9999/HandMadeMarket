<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandMade Market | Sign Up</title>
    <style>
        /* 로그인 화면과 같은 브랜드 토큰으로 회원가입 화면 톤을 맞춤 */
        :root {
            --bg: #f4f7fd;
            --ink: #0f1729;
            --muted: #5e6778;
            --surface: #ffffff;
            --line: #dde4f0;
            --brand-blue: #3566ff;
            --brand-blue-dark: #224fd6;
            --accent: #ff6f2c;
            --shadow: 0 16px 40px rgba(28, 58, 125, 0.14);
            --danger: #d63d32;
        }

        * {
            box-sizing: border-box;
        }

        /* 회원가입 페이지도 로그인 화면과 같은 배경과 폰트를 사용함 */
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SUIT", "Pretendard", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                    radial-gradient(circle at 8% 6%, rgba(53, 102, 255, 0.18), transparent 26%),
                    radial-gradient(circle at 94% 0%, rgba(255, 111, 44, 0.14), transparent 22%),
                    var(--bg);
        }

        .container {
            width: min(1140px, 100% - 28px);
            margin: 0 auto;
        }

        .utility-bar {
            border-bottom: 1px solid var(--line);
            background: #fff;
        }

        .utility-inner {
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .utility-links {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .utility-links a {
            color: var(--muted);
            text-decoration: none;
        }

        .top {
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            text-decoration: none;
            color: var(--ink);
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.7px;
        }

        .brand em {
            color: var(--brand-blue);
            font-style: normal;
        }

        .home-link {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(145deg, var(--brand-blue) 0%, var(--brand-blue-dark) 100%);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 16px;
            padding: 8px 0 42px;
        }

        .hero {
            border-radius: 18px;
            padding: 28px;
            color: #fff;
            background: linear-gradient(126deg, #365cf4 0%, #2c84ff 52%, #3abff5 100%);
            box-shadow: var(--shadow);
            display: grid;
            align-content: center;
            gap: 14px;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.22;
            letter-spacing: -0.3px;
        }

        .hero p {
            margin: 0;
            opacity: 0.95;
            line-height: 1.7;
            font-size: 15px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 24px 22px;
            display: grid;
            gap: 12px;
        }

        .eyebrow {
            margin: 0;
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        .desc,
        .signup-message {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .signup-form {
            display: grid;
            gap: 10px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .field label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .field input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 13px 14px;
            color: var(--ink);
            background: #fff;
            outline: none;
        }

        .field input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(53, 102, 255, 0.12);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            color: #fff;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            margin-top: 4px;
            background: linear-gradient(145deg, var(--brand-blue) 0%, var(--brand-blue-dark) 100%);
        }

        .btn-ghost {
            border: 1px solid var(--line);
            color: var(--ink);
            background: #fff;
        }

        .signup-message {
            min-height: 20px;
        }

        .signup-message.error {
            color: var(--danger);
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 29px;
            }
        }

        @media (max-width: 640px) {
            .utility-inner > span {
                display: none;
            }

            .brand {
                font-size: 26px;
            }

            .panel {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<!-- 로그인/홈 화면과 같은 상단 이동 링크를 제공함 -->
<header class="utility-bar">
    <div class="container utility-inner">
        <span>새 계정을 만들고 핸드메이드 상품을 더 편하게 둘러보세요.</span>
        <nav class="utility-links">
            <a th:href="@{/}">홈</a>
            <a th:href="@{/login}">로그인</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="top">
        <a class="brand" th:href="@{/}">HandMade <em>Market</em></a>
        <a class="home-link" th:href="@{/login}">로그인으로 이동</a>
    </div>

    <main class="layout">
        <section class="hero">
            <h1>새 계정으로<br>마켓 이용을 시작하세요</h1>
            <p>아이디와 비밀번호로 가입하면 장바구니, 주문, 상품 등록 흐름을 같은 세션 기준으로 사용할 수 있습니다.</p>
        </section>

        <section class="panel">
            <p class="eyebrow">SIGN UP</p>
            <h1 class="title">회원가입</h1>
            <p class="desc">가입 후 로그인 화면에서 아이디와 비밀번호로 바로 로그인할 수 있습니다.</p>

            <!-- 회원가입 API가 요구하는 필드만 입력받아 local 계정을 생성함 -->
            <form id="signup-form" class="signup-form">
                <div class="field">
                    <label for="loginId">아이디</label>
                    <input id="loginId" name="loginId" type="text" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="userName">이름</label>
                    <input id="userName" name="userName" type="text" autocomplete="name" required>
                </div>
                <div class="field">
                    <label for="email">이메일</label>
                    <input id="email" name="email" type="email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="password">비밀번호</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required>
                </div>
                <div class="field">
                    <label for="passwordConfirm">비밀번호 확인</label>
                    <input id="passwordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" required>
                </div>
                <button class="btn btn-primary" type="submit">회원가입</button>
                <p id="signup-message" class="signup-message"></p>
            </form>

            <a class="btn btn-ghost" th:href="@{/login}">이미 계정이 있습니다</a>
        </section>
    </main>
</div>

<script>
    const signupForm = document.getElementById('signup-form');
    const signupMessage = document.getElementById('signup-message');

    signupForm.addEventListener('submit', handleSignup);

    // 비밀번호 확인 후 회원가입 JSON API로 local 계정을 생성함
    async function handleSignup(event) {
        event.preventDefault();
        setSignupMessage('가입 처리 중입니다.', '');

        const formData = new FormData(signupForm);
        const password = formData.get('password');
        const passwordConfirm = formData.get('passwordConfirm');

        if (password !== passwordConfirm) {
            setSignupMessage('비밀번호가 서로 다릅니다.', 'error');
            return;
        }

        const payload = {
            loginId: formData.get('loginId'),
            userName: formData.get('userName'),
            email: formData.get('email'),
            password
        };

        try {
            const response = await fetch('/api/user/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const message = await response.text();
            if (!response.ok) {
                throw new Error(message || '회원가입에 실패했습니다.');
            }

            setSignupMessage(message || '계정이 생성되었습니다. 로그인 화면으로 이동합니다.', '');
            setTimeout(() => {
                window.location.href = '/login';
            }, 700);
        } catch (error) {
            setSignupMessage(error.message || '회원가입에 실패했습니다.', 'error');
        }
    }

    // 회원가입 결과를 폼 내부에 표시해 실패 원인을 바로 확인하게 함
    function setSignupMessage(message, type) {
        signupMessage.textContent = message;
        signupMessage.className = `signup-message ${type || ''}`;
    }
</script>
</body>
</html>
