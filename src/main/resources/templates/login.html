<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandMade Market | Login</title>
    <style>
        :root {
            --bg: #f0f4fb;
            --ink: #1f2430;
            --muted: #5d6677;
            --surface: #ffffff;
            --line: #dfe6f1;
            --brand: #03c75a;
            --brand-dark: #00ab4d;
            --soft: #eef4ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background: linear-gradient(135deg, #deebff 0%, #f7fbff 45%, #e6fff3 100%);
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .panel {
            width: 100%;
            max-width: 470px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 28px 22px;
            box-shadow: 0 16px 40px rgba(39, 75, 122, 0.14);
        }

        .title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .desc {
            margin-top: 10px;
            color: var(--muted);
            line-height: 1.6;
        }

        .status {
            margin-top: 18px;
            background: var(--soft);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            color: #274c82;
        }

        .naver-btn {
            width: 100%;
            margin-top: 20px;
            border: 0;
            border-radius: 12px;
            background: var(--brand);
            color: #fff;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .naver-btn:hover {
            background: var(--brand-dark);
        }

        .links {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .link {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
        }

        .link:hover {
            color: var(--ink);
        }

        /* // 이유: 로그인 상태에서만 로그아웃 버튼을 분리 배치하기 위해 추가.
           // 역할: 로그아웃 폼의 상단 간격을 보장해 버튼 충돌 방지. */
        .logout-wrap {
            margin-top: 12px;
        }

        /* // 이유: 네이버 로그인 버튼과 시각적 우선순위를 분리하려고 보조 스타일 적용.
           // 역할: 로그인 상태 전용 로그아웃 버튼 UI를 제공. */
        .logout-btn {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            color: var(--ink);
        }
    </style>
</head>
<body>
<section class="panel">
    <h1 class="title">로그인</h1>
    <p class="desc">
        현재 프로젝트는 네이버 OAuth2 로그인을 사용합니다.
        버튼 클릭 시 <code>/oauth2/authoriztion/naver</code> 경로를 통해 인증을 시작합니다.
    </p>

    <div class="status" th:if="${isLoggedIn}">
        이미 로그인된 상태입니다.
        <span th:text="${displayName}">user</span> 님으로 인증되어 있습니다.
    </div>

    <!-- // 이유: 비로그인 상태에서는 인증 시작 버튼이 필요함.
         // 역할: /oauth2/authoriztion/naver 경로로 OAuth 로그인 시작. -->
    <a class="naver-btn" th:if="${!isLoggedIn}" th:href="@{/oauth2/authoriztion/naver}">네이버로 로그인</a>
    <!-- // 이유: 이미 로그인한 사용자에게 중복 로그인 대신 이동 동선을 제공.
         // 역할: 홈으로 복귀하는 기본 CTA 역할. -->
    <a class="naver-btn" th:if="${isLoggedIn}" th:href="@{/}">홈으로 돌아가기</a>

    <!-- // 이유: 로그인 페이지에서도 즉시 세션 종료가 가능해야 테스트/운영이 편함.
         // 역할: 현재 인증 사용자를 /logout/naver로 로그아웃 처리. -->
    <form class="logout-wrap" th:if="${isLoggedIn}" th:action="@{/logout/naver}" method="post">
        <button class="logout-btn" type="submit">로그아웃</button>
    </form>

    <div class="links">
        <a class="link" th:href="@{/}">홈으로 이동</a>
        <a class="link" th:href="@{/oauth2/authorization/naver}">정식 OAuth 경로</a>
    </div>
</section>
</body>
</html>
