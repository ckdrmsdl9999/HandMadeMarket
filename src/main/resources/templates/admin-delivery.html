<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배송 관리 | HandMade Market</title>
    <style>
        :root {
            --ink: #20201d;
            --muted: #6f716a;
            --paper: #fffaf1;
            --line: #e5dac8;
            --brand: #263f35;
            --accent: #b85c38;
            --danger: #a53a26;
            --shadow: 0 18px 44px rgba(30, 41, 33, .12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background:
                    radial-gradient(circle at 12% 12%, rgba(184, 92, 56, .2), transparent 24%),
                    linear-gradient(135deg, #f9f1e2, #edf0e4);
            font-family: "Noto Serif KR", Georgia, serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar {
            border-bottom: 1px solid rgba(38, 63, 53, .12);
            background: rgba(255, 250, 241, .84);
            backdrop-filter: blur(12px);
        }

        .topbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -.04em;
        }

        .logo em {
            color: var(--accent);
            font-style: normal;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--muted);
            font-size: 14px;
        }

        .nav button {
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
        }

        .hero {
            padding: 38px 0 22px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: clamp(36px, 5vw, 60px);
            line-height: 1;
            letter-spacing: -.07em;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .panel {
            background: rgba(255, 250, 241, .88);
            border: 1px solid rgba(38, 63, 53, .13);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 48px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
        }

        .status.error {
            color: var(--danger);
        }

        .btn {
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            color: #fffaf1;
            background: var(--brand);
            cursor: pointer;
            font-weight: 900;
        }

        .btn-light {
            color: var(--ink);
            background: #fff;
            border: 1px solid var(--line);
        }

        .btn-danger {
            background: var(--danger);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 920px;
        }

        th,
        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 13px;
            font-weight: 900;
        }

        td input,
        td select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 11px;
            background: #fffdf8;
        }

        .row-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty {
            padding: 34px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 20px;
        }

        @media (max-width: 760px) {
            .topbar-inner,
            .toolbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <a class="logo" th:href="@{/}">HandMade <em>Market</em></a>
        <nav class="nav">
            <a th:href="@{/shop}">상품</a>
            <a th:href="@{/orders}">주문</a>
            <a th:href="@{/admin/users}">사용자관리</a>
            <a th:href="@{/admin/delivery}">배송관리</a>
            <form th:action="@{/logout/naver}" method="post">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <section class="hero">
        <h1>배송 상태와 주소를<br>운영자가 관리합니다</h1>
        <p>전체 배송 목록 조회, 배송지/상태 수정, 배송 데이터 삭제 API를 관리자 화면에서 연결합니다.</p>
    </section>

    <section class="panel">
        <div class="toolbar">
            <div id="status" class="status">배송 목록을 불러오는 중입니다.</div>
            <button id="reload-btn" class="btn btn-light" type="button">새로고침</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>배송 ID</th>
                    <th>주문 ID</th>
                    <th>배송지</th>
                    <th>상태</th>
                    <th>생성일</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody id="delivery-body"></tbody>
            </table>
        </div>
        <div id="empty" class="empty" style="display:none;">배송 데이터가 없습니다.</div>
    </section>
</main>

<script>
    const refs = {
        status: document.getElementById('status'),
        reloadButton: document.getElementById('reload-btn'),
        body: document.getElementById('delivery-body'),
        empty: document.getElementById('empty')
    };

    refs.reloadButton.addEventListener('click', loadDeliveries);
    refs.body.addEventListener('click', handleDeliveryAction);

    // 관리자 화면 진입 시 전체 배송 목록을 바로 조회함
    loadDeliveries();

    async function loadDeliveries() {
        try {
            setStatus('배송 목록을 불러오는 중입니다.', '');
            const deliveries = await requestJson('/api/delivery');
            renderDeliveries(deliveries);
            setStatus(`${deliveries.length}개의 배송을 표시합니다.`, '');
        } catch (error) {
            renderDeliveries([]);
            setStatus(error.message, 'error');
        }
    }

    function renderDeliveries(deliveries) {
        refs.empty.style.display = deliveries.length ? 'none' : 'block';
        refs.body.innerHTML = deliveries.map(delivery => `
            <tr data-delivery-id="${delivery.id}">
                <td>#${delivery.id}</td>
                <td>#${delivery.orderId}</td>
                <td><input name="address" value="${escapeHtml(delivery.address)}"></td>
                <td>
                    <select name="status">
                        ${['READY', 'SHIPPING', 'DELIVERED', 'CANCELED'].map(status => `
                            <option value="${status}" ${delivery.status === status ? 'selected' : ''}>${status}</option>
                        `).join('')}
                    </select>
                </td>
                <td>${formatDate(delivery.createdAt)}</td>
                <td>
                    <div class="row-actions">
                        <button class="btn" type="button" data-action="save">저장</button>
                        <button class="btn btn-danger" type="button" data-action="delete">삭제</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function handleDeliveryAction(event) {
        const button = event.target.closest('button[data-action]');
        if (!button) {
            return;
        }

        const row = button.closest('tr[data-delivery-id]');
        const deliveryId = Number(row.dataset.deliveryId);

        try {
            if (button.dataset.action === 'save') {
                await requestJson(`/api/delivery/${deliveryId}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        address: row.querySelector('[name="address"]').value,
                        status: row.querySelector('[name="status"]').value
                    })
                });
                setStatus('배송 정보가 수정되었습니다.', '');
            }
            if (button.dataset.action === 'delete') {
                await requestJson(`/api/delivery/${deliveryId}`, { method: 'DELETE' });
                setStatus('배송 정보가 삭제되었습니다.', '');
            }
            await loadDeliveries();
        } catch (error) {
            setStatus(error.message, 'error');
        }
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
            ...options
        });
        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `요청 실패: ${response.status}`);
        }
        return response.status === 204 ? null : response.json();
    }

    function setStatus(message, type) {
        refs.status.textContent = message;
        refs.status.className = `status ${type || ''}`;
    }

    function formatDate(value) {
        if (!value) {
            return '-';
        }
        const date = Array.isArray(value)
            ? new Date(value[0], value[1] - 1, value[2], value[3] || 0, value[4] || 0)
            : new Date(value);
        return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString('ko-KR');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
